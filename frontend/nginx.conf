server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri /index.html;
    }

    # Detection engine — MUST come before /api/logs (regex order)
    location ~ ^/api/logs/analyze {
        proxy_pass http://detection-engine:8000/analyze;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Log collector (GET /api/logs → /logs)
    location ~ ^/api/logs {
        proxy_pass http://log-collector:8000/logs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Explainer
    location ~ ^/api/explain {
        proxy_pass http://explainer:8000/explain;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SOC Backend (alerts, attacks, dashboard, health)
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
